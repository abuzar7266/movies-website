name: CI

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  backend-unit:
    name: Backend • Lint • Typecheck • Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: movieshelf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      # Ephemeral services for unit tests
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/movieshelf_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/movieshelf_test
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      VALIDATE_ENV_STRICT: "true"
      # Optional services and tuning
      REDIS_URL: redis://localhost:6379
      METRICS_ENABLED: "false"
      RANK_RECOMPUTE_LIMIT: ${{ secrets.RANK_RECOMPUTE_LIMIT }}
      COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
      COOKIE_SAMESITE: ${{ secrets.COOKIE_SAMESITE }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Apply schema to test DB
        run: npx prisma db push
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test

  backend-integration:
    name: Backend • Integration Tests (Postgres)
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: movieshelf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/movieshelf_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/movieshelf_test
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      VALIDATE_ENV_STRICT: "true"
      REDIS_URL: redis://localhost:6379
      METRICS_ENABLED: "false"
      RATE_LIMIT_LIMIT: ${{ secrets.RATE_LIMIT_LIMIT }}
      RANK_RECOMPUTE_LIMIT: ${{ secrets.RANK_RECOMPUTE_LIMIT }}
      COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
      COOKIE_SAMESITE: ${{ secrets.COOKIE_SAMESITE }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Apply migrations
        run: npx prisma migrate deploy --config prisma.config.ts
      - name: Integration tests
        run: npm run test:integration

  frontend:
    name: Frontend • Lint • Build • Tests
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Build (includes typecheck)
        run: npm run build
      - name: Tests
        run: npm run test
      
