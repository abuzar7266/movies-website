name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  backend-unit:
    name: Backend • Lint • Typecheck • Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: movieshelf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      # Ephemeral services for unit tests
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/movieshelf_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/movieshelf_test
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      VALIDATE_ENV_STRICT: "true"
      REDIS_URL: ${{ secrets.REDIS_URL }}
      # Optional services and tuning
      REDIS_URL: redis://localhost:6379
      METRICS_ENABLED: "false"
      RANK_RECOMPUTE_LIMIT: ${{ secrets.RANK_RECOMPUTE_LIMIT }}
      COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
      COOKIE_SAMESITE: ${{ secrets.COOKIE_SAMESITE }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test

  backend-integration:
    name: Backend • Integration Tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: movieshelf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/movieshelf_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/movieshelf_test
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      VALIDATE_ENV_STRICT: "true"
      REDIS_URL: redis://localhost:6379
      METRICS_ENABLED: "false"
      RATE_LIMIT_LIMIT: ${{ secrets.RATE_LIMIT_LIMIT }}
      RANK_RECOMPUTE_LIMIT: ${{ secrets.RANK_RECOMPUTE_LIMIT }}
      COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
      COOKIE_SAMESITE: ${{ secrets.COOKIE_SAMESITE }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Apply migrations
        run: npx prisma migrate deploy
      - name: Integration tests
        run: npm run test:integration

  frontend:
    name: Frontend • Lint • Build • Tests
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Build (includes typecheck)
        run: npm run build
      - name: Tests
        run: npm run test

  docker-build:
    name: Docker • Build Images
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend]
    env:
      # API base to bake into the frontend container image. Set this secret to http://backend:4000
      # if the image will be used alongside the backend container on the same Docker network.
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t movieshelf-backend:ci .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile --build-arg VITE_API_BASE="$VITE_API_BASE" -t movieshelf-frontend:ci .

  compose-smoke:
    name: Docker Compose • Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-unit, frontend]
    env:
      # Backend env
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      VALIDATE_ENV_STRICT: "true"
      REDIS_URL: ${{ secrets.REDIS_URL }}
      METRICS_ENABLED: ${{ secrets.METRICS_ENABLED }}
      RATE_LIMIT_WINDOW_MS: ${{ secrets.RATE_LIMIT_WINDOW_MS }}
      RATE_LIMIT_LIMIT: ${{ secrets.RATE_LIMIT_LIMIT }}
      RANK_RECOMPUTE_LIMIT: ${{ secrets.RANK_RECOMPUTE_LIMIT }}
      COOKIE_DOMAIN: ${{ secrets.COOKIE_DOMAIN }}
      COOKIE_SAMESITE: ${{ secrets.COOKIE_SAMESITE }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_FORCE_PATH_STYLE: ${{ secrets.S3_FORCE_PATH_STYLE }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      # Frontend build arg
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker Compose version
        run: docker compose version
      - name: Compose up (build and run)
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build
      - name: Wait for backend health
        shell: bash
        run: |
          for i in {1..50}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4000/healthz || true)
            if [ "$code" = "200" ]; then echo "Backend healthy"; exit 0; fi
            sleep 2
          done
          echo "Backend did not become healthy" >&2
          docker compose logs backend || true
          exit 1
      - name: Smoke check frontend
        run: curl -sf http://localhost:8080 >/dev/null
      - name: Compose logs (on failure)
        if: failure()
        run: docker compose logs --no-color || true
      - name: Compose down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
